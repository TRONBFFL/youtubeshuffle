<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#111111"/>

  <!-- Top arrow: left-top → curves down → exits bottom-right (dark gray) -->
  <path d="M8 20 C 20 20, 28 44, 44 44" stroke="#cccccc" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Arrowhead bottom-right -->
  <polyline points="38,38 44,44 38,50" stroke="#cccccc" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom arrow: left-bottom → curves up → exits top-right (red) -->
  <path d="M8 44 C 20 44, 28 20, 44 20" stroke="#dd0000" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Arrowhead top-right -->
  <polyline points="38,14 44,20 38,26" stroke="#dd0000" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
